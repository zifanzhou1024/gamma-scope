# Full Nginx vhost template for GammaScope behind AMH.
# Certificate paths assume Certbot/Let's Encrypt for gamma.hiqjj.org.

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

upstream gammascope_web {
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream gammascope_api {
    server 127.0.0.1:8000;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name gamma.hiqjj.org;

    location /.well-known/acme-challenge/ {
        root /home/wwwroot/gammascope;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name gamma.hiqjj.org;

    ssl_certificate /etc/letsencrypt/live/gamma.hiqjj.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gamma.hiqjj.org/privkey.pem;

    client_max_body_size 100m;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;

    location ^~ /_next/ {
        proxy_pass http://gammascope_web;
        proxy_http_version 1.1;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location ^~ /images/ {
        proxy_pass http://gammascope_web;
        proxy_http_version 1.1;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location = /favicon.ico {
        proxy_pass http://gammascope_web;
        proxy_http_version 1.1;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location ^~ /api/admin/ {
        proxy_pass http://gammascope_web;
        proxy_http_version 1.1;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location ^~ /api/replay/imports {
        proxy_pass http://gammascope_web;
        proxy_http_version 1.1;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location = /api/views {
        proxy_pass http://gammascope_web;
        proxy_http_version 1.1;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location = /api/spx/0dte/snapshot/latest {
        proxy_pass http://gammascope_web;
        proxy_http_version 1.1;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location = /api/spx/0dte/status {
        proxy_pass http://gammascope_web;
        proxy_http_version 1.1;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location = /api/spx/0dte/heatmap/latest {
        proxy_pass http://gammascope_web;
        proxy_http_version 1.1;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location ^~ /api/spx/0dte/experimental/ {
        proxy_pass http://gammascope_web;
        proxy_http_version 1.1;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location ^~ /api/spx/0dte/replay/ {
        proxy_pass http://gammascope_web;
        proxy_http_version 1.1;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location = /api/spx/0dte/scenario {
        proxy_pass http://gammascope_web;
        proxy_http_version 1.1;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location = /api/spx/0dte/collector/events {
        proxy_pass http://gammascope_api;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    location = /api/spx/0dte/collector/events/bulk {
        proxy_pass http://gammascope_api;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location ^~ /ws/ {
        proxy_pass http://gammascope_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
        proxy_buffering off;
    }

    location / {
        proxy_pass http://gammascope_web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_buffering off;
    }
}

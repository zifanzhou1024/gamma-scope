name: gammascope

x-api-environment: &api-environment
  GAMMASCOPE_DATABASE_URL: postgresql://${GAMMASCOPE_POSTGRES_USER:-gammascope}:${GAMMASCOPE_POSTGRES_PASSWORD:?set GAMMASCOPE_POSTGRES_PASSWORD}@postgres:5432/${GAMMASCOPE_POSTGRES_DB:-gammascope}
  GAMMASCOPE_REDIS_URL: redis://redis:6379/0
  GAMMASCOPE_REPLAY_CAPTURE_INTERVAL_SECONDS: ${GAMMASCOPE_REPLAY_CAPTURE_INTERVAL_SECONDS:-5}
  GAMMASCOPE_REPLAY_RETENTION_DAYS: ${GAMMASCOPE_REPLAY_RETENTION_DAYS:-20}
  GAMMASCOPE_SAVED_VIEW_RETENTION_DAYS: ${GAMMASCOPE_SAVED_VIEW_RETENTION_DAYS:-90}
  GAMMASCOPE_PRIVATE_MODE_ENABLED: ${GAMMASCOPE_PRIVATE_MODE_ENABLED:-true}
  GAMMASCOPE_ADMIN_TOKEN: ${GAMMASCOPE_ADMIN_TOKEN:?set GAMMASCOPE_ADMIN_TOKEN}

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${GAMMASCOPE_POSTGRES_DB:-gammascope}
      POSTGRES_USER: ${GAMMASCOPE_POSTGRES_USER:-gammascope}
      POSTGRES_PASSWORD: ${GAMMASCOPE_POSTGRES_PASSWORD:?set GAMMASCOPE_POSTGRES_PASSWORD}
    volumes:
      - gammascope-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${GAMMASCOPE_POSTGRES_USER:-gammascope} -d ${GAMMASCOPE_POSTGRES_DB:-gammascope}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: gamma-scope-api:amh
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      <<: *api-environment
    ports:
      - "127.0.0.1:${GAMMASCOPE_API_HOST_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/spx/0dte/replay/sessions', timeout=2).read()\""
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  web:
    image: gamma-scope-web:amh
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_GAMMASCOPE_WS_URL: ${GAMMASCOPE_PUBLIC_ORIGIN:?set GAMMASCOPE_PUBLIC_ORIGIN}
    restart: unless-stopped
    environment:
      GAMMASCOPE_API_BASE_URL: http://api:8000
      GAMMASCOPE_ADMIN_TOKEN: ${GAMMASCOPE_ADMIN_TOKEN:?set GAMMASCOPE_ADMIN_TOKEN}
      GAMMASCOPE_WEB_ADMIN_USERNAME: ${GAMMASCOPE_WEB_ADMIN_USERNAME:-admin}
      GAMMASCOPE_WEB_ADMIN_PASSWORD: ${GAMMASCOPE_WEB_ADMIN_PASSWORD:?set GAMMASCOPE_WEB_ADMIN_PASSWORD}
      GAMMASCOPE_WEB_ADMIN_SESSION_SECRET: ${GAMMASCOPE_WEB_ADMIN_SESSION_SECRET:?set GAMMASCOPE_WEB_ADMIN_SESSION_SECRET}
      GAMMASCOPE_REPLAY_IMPORT_MAX_BYTES: ${GAMMASCOPE_REPLAY_IMPORT_MAX_BYTES:-104857600}
    ports:
      - "127.0.0.1:${GAMMASCOPE_WEB_HOST_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

volumes:
  gammascope-postgres:

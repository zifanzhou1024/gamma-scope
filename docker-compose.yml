services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: gammascope
      POSTGRES_USER: gammascope
      POSTGRES_PASSWORD: gammascope
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gammascope -d gammascope"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
